<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GlowKart Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(to right,#ff9ec4,#ffd6e8);
        }

        .login-box{
            background:white;
            padding:40px;
            width:350px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            text-align:center;
        }

        .login-box h1{
            margin-bottom:25px;
            color:#ff4f8b;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#ff4f8b;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#e63e77;
        }

        .error{
            color:red;
            margin-top:15px;
            display:none;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h1>GlowKart Login</h1>

        <div class="input-box">
            <input type="text" id="username" placeholder="Enter Username">
        </div>

        <div class="input-box">
            <input type="password" id="password" placeholder="Enter Password">
        </div>

        <button onclick="login()">
            Login
        </button>

        <p class="error" id="error">
            Invalid Username or Password
        </p>

    </div>

    <script>

        function login(){

            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;

            if(username === "prajakta" && password === "prajakta@123"){

                window.location.href = "home.html";

            }
            else{

                document.getElementById("error").style.display = "block";

            }

        }

    </script>

</body>

</html>
